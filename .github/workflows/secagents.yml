# PR security scan: Docker sandbox + optional Ollama or cloud LLM. Uploads artifacts; may fail the check.
name: SecAgents Scan

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: secagents-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OLLAMA_MODEL: ${{ vars.SECAGENTS_OLLAMA_MODEL }}
      PARALLEL_SPEC: ${{ vars.SECAGENTS_PARALLEL_SPECIALISTS }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install SecAgents
        run: python -m pip install -U pip && python -m pip install -e .

      - name: Start Ollama
        run: |
          docker pull ollama/ollama:latest
          docker run -d --name secagents-ollama -p 11434:11434 \
            -v secagents-ollama:/root/.ollama \
            ollama/ollama:latest
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
              echo "Ollama is up"
              break
            fi
            sleep 2
          done

      - name: Pull Ollama model
        run: |
          M="${OLLAMA_MODEL:-llama3.2}"
          echo "Pulling $M"
          docker exec secagents-ollama ollama pull "$M"

      - name: Run SecAgents CI
        env:
          SECAGENTS_OLLAMA_BASE_URL: http://127.0.0.1:11434
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          M="${OLLAMA_MODEL:-llama3.2}"
          PS="${PARALLEL_SPEC:-2}"
          if [ -n "$OPENAI_API_KEY" ]; then
            python -m secagents ci . --provider openai --model "${SECAGENTS_OPENAI_MODEL:-gpt-4o-mini}" \
              --fail-on high --out-dir secagents-report --max-turns 12 --temperature 0.1 \
              --parallel-specialists "$PS"
          elif [ -n "$ANTHROPIC_API_KEY" ]; then
            python -m secagents ci . --provider anthropic --model "${SECAGENTS_ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}" \
              --fail-on high --out-dir secagents-report --max-turns 12 --temperature 0.1 \
              --parallel-specialists "$PS"
          else
            python -m secagents ci . --provider ollama --model "$M" \
              --fail-on high --out-dir secagents-report --max-turns 12 --temperature 0.1 \
              --parallel-specialists "$PS"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secagents-report
          path: secagents-report/
          if-no-files-found: warn
